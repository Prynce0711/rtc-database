name: Build and Publish to Docker Hub
permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build the WebServer image
        run: docker build . --file WebServer/DockerFile --tag ${{ secrets.DOCKER_USERNAME }}/rtc-database-webserver:latest
      - name: Build the RelayServer image
        run: docker build . --file RelayServer/DockerFile --tag ${{ secrets.DOCKER_USERNAME }}/rtc-database-relay:latest
      - name: Push the WebServer image
        run: docker push prynce0711/rtc-database-webserver:latest
      - name: Push the RelayServer image
        run: docker push prynce0711/rtc-database-relay:latest
